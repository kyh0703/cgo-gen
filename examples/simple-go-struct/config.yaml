version: 1

input:
  headers:
    - cpp/ThingModel.hpp
    - cpp/ThingApi.hpp
  clang_args:
    - -std=c++17
    - -x
    - c++

output:
  dir: pkg/demo

files:
  model:
    - cpp/ThingModel.hpp
  facade:
    - cpp/ThingApi.hpp

naming:
  prefix: cgowrap
  style: preserve

policies:
  string_mode: c_str
  enum_mode: c_enum
  unsupported:
    templates: error
    stl_containers: skip
    exceptions: error
