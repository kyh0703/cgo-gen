version: 1

input:
  headers:
    - cpp/ThingModel.hpp

output:
  dir: pkg/model

files:
  model:
    - cpp/ThingModel.hpp

naming:
  prefix: cgowrap
  style: preserve

policies:
  string_mode: c_str
  enum_mode: c_enum
  unsupported:
    templates: error
    stl_containers: skip
    exceptions: error
