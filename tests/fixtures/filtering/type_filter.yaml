version: 1

input:
  headers:
    - include/api.hpp
  compile_commands: build/compile_commands.json

output:
  dir: out
  header: wrapper.h
  source: wrapper.cpp
  ir: wrapper.ir.yaml

filter:
  namespaces: [alpha::*]
  classes: [Widget]
  methods: [alpha::inner::Widget::*]
  functions: [alpha::inner::*]
  types: [std::string]
  enums: [alpha::inner::Mode]

naming:
  prefix: cgowrap
  style: snake_case

policies:
  string_mode: c_str
  enum_mode: c_enum
  unsupported:
    templates: error
    stl_containers: skip
    exceptions: error
