version: 1

# Edit these paths for your environment before running the command.
input:
  headers:
    - /absolute/path/to/src/IE/SIL/IsAAMaster.h
    - /absolute/path/to/src/IE/SIL/IsAAUser.h
  clang_args:
    - -std=c++11
    - -x
    - c++
    - -I/absolute/path/to/CORE/inc
    - -I/absolute/path/to/CORE/inc/iCore
    - -I/absolute/path/to/CORE/inc/iJson
    - -I/absolute/path/to/CORE/inc/iSqlLib
    - -I/absolute/path/to/src/IE/inc
    - -I/absolute/path/to/src/IE/SIL
    - -I/absolute/path/to/src/LIB/inc
    - -I/absolute/path/to/src/LIB/inc/iBus
    - -I/absolute/path/to/src/LIB/inc/iUtil

output:
  dir: ./pkg/sil

files:
  model:
    - /absolute/path/to/src/IE/SIL/IsAAMaster.h
  facade:
    - /absolute/path/to/src/IE/SIL/IsAAUser.h

naming:
  prefix: sil
  style: preserve

policies:
  string_mode: c_str
  enum_mode: c_enum
  unsupported:
    templates: error
    stl_containers: skip
    exceptions: error
